deployItems:
  - name: item
    type: landscaper.gardener.cloud/kubernetes-manifest

    target:
      import: cluster

    config:
      apiVersion: manifest.deployer.landscaper.gardener.cloud/v1alpha2
      kind: ProviderConfiguration
      updateStrategy: update
      manifests:
        - policy: manage
          manifest:
            apiVersion: kustomize.toolkit.fluxcd.io/v1
            kind: Kustomization
            metadata:
              name: dataflow-first
              namespace: flux-system
              annotations:
                reconcile.fluxcd.io/requestedAt: {{ now }}
            spec:
              force: false
              interval: 1440m
              path: ./docs/guided-tour/flux/dataflow/resources/first
              prune: true
              retryInterval: 2m0s
              sourceRef:
                kind: GitRepository
                name: {{ .imports.gitRepositoryName }}
              targetNamespace: cu-dataflow
              timeout: 3m0s
              wait: true

      readinessChecks:
        disableDefault: true
        custom:
          - name: KustomizationReady
            timeout: 5m
            resourceSelector:
              - apiVersion: kustomize.toolkit.fluxcd.io/v1
                kind: Kustomization
                name: dataflow-first
                namespace: flux-system
            requirements:
              - jsonPath: .status.conditions[?(@.type == 'Ready')].status
                operator: ==
                values:
                  - value: "True"

      exports:
        exports:
          - key: test-token
            fromResource:
              apiVersion: v1
              kind: Secret
              name: test-secret
              namespace: cu-dataflow
            jsonPath: .data.token
