deployItems:
  - name: item
    type: landscaper.gardener.cloud/kubernetes-manifest

    target:
      import: cluster

    config:
      apiVersion: manifest.deployer.landscaper.gardener.cloud/v1alpha2
      kind: ProviderConfiguration
      updateStrategy: update
      manifests:
        - policy: manage
          manifest:
            apiVersion: source.toolkit.fluxcd.io/v1
            kind: GitRepository
            metadata:
              name: podinfo
              namespace: flux-system
            spec:
              url: https://github.com/stefanprodan/podinfo
              ref:
                branch: master
              interval: 60m
              timeout: 60s
        - policy: manage
          manifest:
            apiVersion: kustomize.toolkit.fluxcd.io/v1
            kind: Kustomization
            metadata:
              name: podinfo
              namespace: flux-system
            spec:
              force: false
              interval: 30m0s
              path: ./kustomize
              prune: true
              retryInterval: 2m0s
              sourceRef:
                kind: GitRepository
                name: podinfo
              targetNamespace: cu-podinfo
              timeout: 3m0s
              wait: true

      readinessChecks:
        disableDefault: true
        custom:
          - name: KustomizationReady
            timeout: 5m
            resourceSelector:
              - apiVersion: kustomize.toolkit.fluxcd.io/v1
                kind: Kustomization
                name: podinfo
                namespace: flux-system
            requirements:
              - jsonPath: .status.conditions[?(@.type == 'Ready')].status
                operator: ==
                values:
                  - value: "True"
